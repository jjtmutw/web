<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>實驗室電子布告牌</title>
  <style>
    :root{
      --bg:#0b1220;
      --text:#e8eefc;
      --muted:#a9b6d6;

      --ok:#22c55e;
      --warn:#f59e0b;
      --busy:#ef4444;
      --cool:#38bdf8;
      --gray:#94a3b8;
      --vac:#a78bfa; /* 休假紫 */
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", Arial, sans-serif;
      background: radial-gradient(1200px 700px at 20% 10%, rgba(96,165,250,.15), transparent 60%),
                  radial-gradient(1000px 600px at 80% 30%, rgba(34,197,94,.10), transparent 60%),
                  var(--bg);
      color:var(--text);
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
    }

    .board{
      width:min(1200px, 100%);
      border-radius:28px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 20px 70px rgba(0,0,0,.45);
      overflow:hidden;
    }

    header{
      padding:28px 32px 18px;
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-end;
    }

    .labname{
      font-size:40px;
      font-weight:800;
      letter-spacing:.5px;
      line-height:1.1;
    }

    .sub{
      margin-top:10px;
      color:var(--muted);
      font-size:16px;
    }

    .right{
      text-align:right;
      min-width:280px;
    }

    .clock{
      font-variant-numeric: tabular-nums;
      font-size:28px;
      font-weight:700;
    }
    .net{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
    }
    .dot{
      width:10px;height:10px;border-radius:999px;background:var(--gray);
      box-shadow:0 0 0 4px rgba(148,163,184,.15);
    }
    .dot.ok{ background:var(--ok); box-shadow:0 0 0 4px rgba(34,197,94,.18); }
    .dot.bad{ background:var(--busy); box-shadow:0 0 0 4px rgba(239,68,68,.18); }

    main{
      padding:26px 32px 34px;
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:18px;
      align-items:stretch;
    }

    .statusCard{
      background: rgba(18,27,46,.78);
      border:1px solid rgba(255,255,255,.10);
      border-radius:24px;
      padding:28px;
      display:flex;
      flex-direction:column;
      gap:14px;
      min-height:260px;
    }

    .label{
      color:var(--muted);
      font-size:15px;
      letter-spacing:.4px;
    }

    .statusLine{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .badge{
      padding:10px 14px;
      border-radius:999px;
      font-weight:800;
      letter-spacing:.4px;
      font-size:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color:var(--text);
    }

    .pill{
      width:14px;height:14px;border-radius:999px;
      background:var(--gray);
      box-shadow:0 0 0 6px rgba(148,163,184,.12);
    }
    .pill.ok{ background:var(--ok); box-shadow:0 0 0 6px rgba(34,197,94,.14); }
    .pill.warn{ background:var(--warn); box-shadow:0 0 0 6px rgba(245,158,11,.14); }
    .pill.busy{ background:var(--busy); box-shadow:0 0 0 6px rgba(239,68,68,.14); }
    .pill.cool{ background:var(--cool); box-shadow:0 0 0 6px rgba(56,189,248,.14); }
    .pill.gray{ background:var(--gray); box-shadow:0 0 0 6px rgba(148,163,184,.12); }
    .pill.vac{ background:var(--vac); box-shadow:0 0 0 6px rgba(167,139,250,.16); }

    /* 狀態字型加大 */
    .statusText{
      font-size:72px;
      font-weight:900;
      line-height:1.02;
      letter-spacing:1px;
    }

    /* ✅ 右側改成照片區 */
    .photoCard{
      background: rgba(18,27,46,.60);
      border:1px solid rgba(255,255,255,.10);
      border-radius:24px;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      overflow:hidden;
    }

    .photoWrap{
      border-radius:20px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      height:100%;
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .photoWrap img{
      width:100%;
      height:100%;
      object-fit:cover; /* ✅ 自動裁切填滿 */
      display:block;
    }

    .photoCaption{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:14px;
      padding:0 4px 2px;
    }

    footer{
      padding:14px 32px 18px;
      color:var(--muted);
      font-size:13px;
      display:flex;
      justify-content:space-between;
      border-top:1px solid rgba(255,255,255,.08);
    }

    @media (max-width: 900px){
      main{ grid-template-columns: 1fr; }
      .statusText{ font-size:54px; }
      .labname{ font-size:32px; }
      .photoWrap{ min-height:260px; }
    }
  </style>
</head>

<body>
  <div class="board">
    <header>
      <div>
        <div class="labname" id="labName">醫療 AI 與健康 IoT 實驗室</div>
        <div class="sub">Laboratory Status Board (MQTT over WSS)</div>
      </div>
      <div class="right">
        <div class="clock" id="clock">--:--</div>
        <div class="net">
          <span class="dot" id="netDot"></span>
          <span id="netText">MQTT 未連線</span>
        </div>
      </div>
    </header>

    <main>
      <section class="statusCard">
        <div class="label">目前狀態</div>
        <div class="statusLine">
          <span class="pill gray" id="statusPill"></span>
          <span class="badge" id="statusCode">UNKNOWN</span>
        </div>
        <div class="statusText" id="statusText">等待更新</div>
      </section>

      <!-- ✅ 右側欄位：照片 -->
      <aside class="photoCard">
        <div class="photoCaption">
          <span id="photoTitle">Prof. Jian</span>
          <span>最後更新：<b id="lastUpdate" style="color:var(--text);font-weight:700;">—</b></span>
        </div>
        <div class="photoWrap">
          <!-- 你 repo 同資料夾放 jj.jpg -->
          <img src="jj.jpg" alt="jj" onerror="this.alt='找不到 jj.jpg，請確認與 board.html 同資料夾'; this.style.objectFit='contain';">
        </div>
      </aside>
    </main>

    <footer>
      <div>顯示頁面：建議全螢幕（F11）</div>
      <div>Topic：<span id="cfgTopic">JJ/LAB/status</span></div>
    </footer>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const CONFIG = {
      labName: "醫療 AI 與健康 IoT 實驗室",
      wsUrl: "wss://broker.emqx.io:8084/mqtt",
      topic: "JJ/LAB/status",
      clientId: "lab-board-" + Math.random().toString(16).slice(2),
      username: "",
      password: ""
    };

    const $ = (id) => document.getElementById(id);

    function setNet(connected, text){
      $("netDot").className = "dot " + (connected ? "ok" : "bad");
      $("netText").textContent = text;
    }

    function nowStr(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const da = String(d.getDate()).padStart(2,"0");
      const hh = String(d.getHours()).padStart(2,"0");
      const mm = String(d.getMinutes()).padStart(2,"0");
      const ss = String(d.getSeconds()).padStart(2,"0");
      return `${y}-${m}-${da} ${hh}:${mm}:${ss}`;
    }

    function setStatus(code, text, level){
      $("statusCode").textContent = (code || "unknown").toUpperCase();
      $("statusText").textContent = text || "等待更新";
      $("lastUpdate").textContent = nowStr();

      const lv = level || "gray";
      $("statusPill").className = "pill " + lv;
    }

    /* ✅ 中英都吃：英文 key + 中文同義詞 */
    function parsePayload(payload){
      const raw = (payload || "").trim();
      const p = raw.toLowerCase();

      // custom:xxx / 自訂:xxx / 自定:xxx
      const customPrefixes = ["custom:", "自訂:", "自定:"];
      for (const pre of customPrefixes){
        if (raw.startsWith(pre) || p.startsWith(pre)){
          const customText = raw.slice(pre.length).trim() || "自訂狀態";
          return { code:"custom", text: customText, level:"cool" };
        }
      }

      // 把常見中文直接映射成標準代碼
      const map = new Map([
        // out
        ["out","out"], ["外出","out"], ["外出中","out"], ["外出ing","out"],

        // class
        ["class","class"], ["上課","class"], ["上課中","class"], ["授課","class"], ["教學中","class"],

        // experiment
        ["experiment","experiment"], ["實驗","experiment"], ["實驗中","experiment"], ["實驗進行中","experiment"],

        // meeting
        ["meeting","meeting"], ["開會","meeting"], ["開會中","meeting"], ["會議","meeting"], ["會議中","meeting"],

        // break
        ["break","break"], ["休息","break"], ["休息中","break"],

        // vacation
        ["vacation","vacation"], ["休假","vacation"], ["休假中","vacation"], ["請假","vacation"], ["請假中","vacation"]
      ]);

      const key = map.get(p) || map.get(raw) || null;

      switch(key){
        case "out":        return { code:"out",        text:"外出中", level:"warn" };
        case "class":      return { code:"class",      text:"上課中", level:"busy" };
        case "experiment": return { code:"experiment", text:"實驗中", level:"ok" };
        case "meeting":    return { code:"meeting",    text:"開會中", level:"busy" };
        case "break":      return { code:"break",      text:"休息中", level:"cool" };
        case "vacation":   return { code:"vacation",   text:"休假中", level:"vac" };
        default:
          // 任何未知字串就直接顯示（例如直接丟「訪客來訪」也會顯示）
          return { code:"msg", text: raw || "等待更新", level:"gray" };
      }
    }

    // Init UI
    $("labName").textContent = CONFIG.labName;
    $("cfgTopic").textContent = CONFIG.topic;

    setStatus("unknown","等待更新","gray");
    setNet(false,"MQTT 未連線");

    // Clock
    function tickClock(){
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,"0");
      const mm = String(d.getMinutes()).padStart(2,"0");
      $("clock").textContent = `${hh}:${mm}`;
    }
    tickClock();
    setInterval(tickClock, 1000);

    // MQTT
    const options = {
      clientId: CONFIG.clientId,
      keepalive: 30,
      reconnectPeriod: 2000,
      connectTimeout: 10000,
      clean: true
    };
    if(CONFIG.username) options.username = CONFIG.username;
    if(CONFIG.password) options.password = CONFIG.password;

    const client = mqtt.connect(CONFIG.wsUrl, options);

    client.on("connect", () => {
      setNet(true, "MQTT 已連線");
      client.subscribe(CONFIG.topic, { qos: 0 }, (err) => {
        if(err){
          setNet(false, "訂閱失敗：" + err.message);
          console.error("Subscribe error:", err);
        }
      });
    });

    client.on("reconnect", () => setNet(false, "重新連線中…"));
    client.on("close", () => setNet(false, "MQTT 連線關閉"));
    client.on("error", (e) => {
      setNet(false, "MQTT 錯誤：" + (e?.message || e));
      console.error("MQTT error:", e);
    });

    client.on("message", (topic, message) => {
      const payload = message.toString("utf-8");
      const st = parsePayload(payload);
      setStatus(st.code, st.text, st.level);
    });
  </script>
</body>
</html>
