<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HIoT 實驗室電子布告牌</title>

<style>
:root{
  --bg:#0b1220;
  --text:#e8eefc;
  --muted:#a9b6d6;

  --ok:#22c55e;
  --warn:#f59e0b;
  --busy:#ef4444;
  --cool:#38bdf8;
  --gray:#94a3b8;
  --vac:#a78bfa;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,"Noto Sans TC";
background:var(--bg);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.board{
width:1200px;
background:#0b1220;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 70px rgba(0,0,0,.5);
}

/* ===== 白色 Banner ===== */
.banner{
background:white;
height:90px;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 40px;
}

.banner img{
height:60px;
object-fit:contain;
}

/* ===== Header ===== */
header{
padding:18px 32px;
display:flex;
justify-content:space-between;
align-items:flex-end;
color:white;
}

.labname{
font-size:44px;
font-weight:900;
}

.clock{
font-size:28px;
font-weight:800;
text-align:right;
}

/* ===== Main ===== */
main{
padding:20px 32px 32px;
display:grid;
grid-template-columns:1.55fr .45fr;
gap:18px;
}

/* 左側狀態 */
.statusCard{
background:#121b2e;
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
}

.statusBody{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:24px;
}

.statusLine{
display:flex;
align-items:center;
gap:12px;
}

.pill{
width:14px;height:14px;border-radius:50%;
background:var(--gray);
}

.badge{
padding:6px 14px;
border-radius:20px;
background:#222;
font-weight:900;
}

.statusText{
font-size:96px;
font-weight:1000;
text-align:center;
}

/* 右側照片 */
.photoCard{
background:#121b2e;
border-radius:20px;
padding:12px;
display:flex;
flex-direction:column;
}

.photoCaption{
text-align:center;
font-size:22px;
font-weight:900;
margin-bottom:8px;
}

.photoWrap{
flex:1;
border-radius:16px;
overflow:hidden;
}

.photoWrap img{
width:100%;
height:100%;
object-fit:cover;
}

/* footer */
footer{
color:#aaa;
padding:10px 32px;
display:flex;
justify-content:space-between;
font-size:13px;
}

</style>
</head>

<body>

<div class="board">

<!-- ===== 白色 Logo Banner ===== -->
<div class="banner">
  <img src="tmutitle.png">
  <img src="comlogo.png">
</div>

<header>
  <div class="labname">健康物聯網 HIoT 實驗室</div>
  <div class="clock" id="clock">--:--</div>
</header>

<main>

<section class="statusCard">
  <div class="statusBody">
    <div class="statusLine">
      <div class="pill" id="pill"></div>
      <div class="badge" id="code">UNKNOWN</div>
    </div>

    <div class="statusText" id="status">等待更新</div>
  </div>
</section>

<aside class="photoCard">
  <div class="photoCaption">簡文山 教授</div>
  <div class="photoWrap">
    <img src="jj.jpg">
  </div>
</aside>

</main>

<footer>
<div>顯示頁面建議全螢幕 (F11)</div>
<div id="last">—</div>
</footer>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>

const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt",{
 clientId:"lab-"+Math.random().toString(16).slice(2)
});

const topic="JJ/LAB/status";

function now(){
const d=new Date();
return d.toLocaleString();
}

function setStatus(text,color){
status.innerText=text;
pill.style.background=color;
code.innerText=text;
last.innerText=now();
}

function parse(msg){
msg=msg.trim().toLowerCase();

if(msg.startsWith("custom:")||msg.startsWith("自訂:"))
 return setStatus(msg.split(":")[1],"#38bdf8");

if(["out","外出","外出中"].includes(msg)) setStatus("外出中","#f59e0b");
else if(["class","上課","上課中"].includes(msg)) setStatus("上課中","#ef4444");
else if(["experiment","實驗","實驗中"].includes(msg)) setStatus("實驗中","#22c55e");
else if(["meeting","開會","會議"].includes(msg)) setStatus("開會中","#ef4444");
else if(["break","休息"].includes(msg)) setStatus("休息中","#38bdf8");
else if(["vacation","休假","請假"].includes(msg)) setStatus("休假中","#a78bfa");
else setStatus(msg,"#94a3b8");
}

client.on("connect",()=>{
 client.subscribe(topic);
});

client.on("message",(t,m)=>parse(m.toString()));

function tick(){
const d=new Date();
clock.innerText=d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");
}
setInterval(tick,1000);tick();

</script>

</body>
</html>
